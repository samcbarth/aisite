  <script>
    (function () {
      const btn = document.getElementById('post-linkedin-share');
      const status = document.getElementById('linkedin-share-status');
      if (!btn) return;
      async function copyText(text) {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        return ok;
      }
      btn.addEventListener('click', async () => {
        const shareText = btn.dataset.shareText || window.location.href;
        try {
          await copyText(shareText);
          if (status) status.textContent = 'Post text copied. Paste it into LinkedIn.';
        } catch (err) {
          if (status) status.textContent = 'LinkedIn opening.';
        }
        setTimeout(() => { if (status) status.textContent = ''; }, 3500);
      });
    })();
  </script>
