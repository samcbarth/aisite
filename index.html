<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Site</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: #7c6af7; }
    p { color: #888; max-width: 400px; text-align: center; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.6rem 1.4rem;
      background: #7c6af7;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <h1>Built with <span>AI</span></h1>
  <p>Tools and workflows powered by artificial intelligence.</p>
  <a href="mailto:sam@example.com">Get in touch</a>
</body>
</html>
